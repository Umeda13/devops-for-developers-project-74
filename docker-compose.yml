version: "3.9"

services:
  app:
    image: umeda13/devops-for-developers-project-74:demo
    build:
      context: ./app
    container_name: fastify-blog
    working_dir: /app
    ports:
      - "8080:8080"
    volumes:
      - ./app:/app
    command: make setup && make test
    environment:
      DATABASE_HOST: db
      DATABASE_NAME: postgres
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: password
      DATABASE_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:latest
    container_name: fastify-blog-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
